<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Dark blue circle -->
  <circle cx="100" cy="100" r="100" fill="#1a3aad"/>

  <!-- Vertical bar of L (green to teal gradient) -->
  <defs>
    <linearGradient id="vbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22ee88"/>
      <stop offset="100%" stop-color="#22ccaa"/>
    </linearGradient>
    <linearGradient id="hbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22ccaa"/>
      <stop offset="100%" stop-color="#44aaee"/>
    </linearGradient>
  </defs>

  <!-- Vertical part of L -->
  <rect x="60" y="38" width="30" height="110" rx="14" ry="14" fill="url(#vbar)"/>

  <!-- Horizontal part of L -->
  <rect x="60" y="118" width="90" height="30" rx="14" ry="14" fill="url(#hbar)"/>
</svg>
